services:
  app:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      EPB_API_TOKEN: ${EPB_API_TOKEN:-change-me-strong-token}
      EPB_CORS_ORIGINS: ${EPB_CORS_ORIGINS:-http://127.0.0.1:8501,http://localhost:8501}
      EPB_RATE_LIMIT_PER_MIN: ${EPB_RATE_LIMIT_PER_MIN:-60}
      EPB_MAX_BODY_BYTES: ${EPB_MAX_BODY_BYTES:-131072}
      HOST_ADDR: ${HOST_ADDR:-0.0.0.0}
      VIEWER_PORT: ${VIEWER_PORT:-8765}
      API_PORT: ${API_PORT:-8000}
      STREAMLIT_PORT: ${STREAMLIT_PORT:-8501}
    command: >
      bash -lc "
      pip install --no-cache-dir -e '.[annotate,api]' &&
      bash /app/docker/entrypoint.sh
      "
    ports:
      - "8501:8501"
      - "8000:8000"
      - "8765:8765"
